<!DOCTYPE html>
<html lang="vi">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Thống kê bán hàng</title>

  <script src="https://cdn.tailwindcss.com"></script>
</head>

<body class="bg-zinc-100 min-h-screen">

  <div class="max-w-md mx-auto p-4">

    <h1 class="text-4xl font-bold mb-6">
      Thống kê bán hàng
    </h1>

    <!-- Tổng quan -->
    <div class="grid grid-cols-2 gap-4">

      <div class="bg-red-200 rounded-3xl p-6">
        <p class="text-xl">Đã bán</p>

        <p id="soldCount" class="mt-2 text-4xl font-bold text-red-500">
          0
        </p>
      </div>

      <div class="bg-green-200 rounded-3xl p-6">
        <p class="text-xl">Doanh thu</p>

        <p id="totalMoney" class="mt-2 text-3xl font-bold text-green-500">
          0đ
        </p>
      </div>

    </div>

    <!-- Chi tiết -->
    <div class="bg-white rounded-3xl shadow-sm mt-6 p-6">

      <h2 class="text-2xl font-bold mb-4">
        Chi tiết từng món
      </h2>

      <div id="itemStats" class="space-y-3"></div>

    </div>

    <!-- Top bán chạy -->
    <div class="bg-white rounded-3xl shadow-sm mt-6 p-6">

      <h2 class="text-2xl font-bold mb-4">
        Bán chạy nhất
      </h2>

      <div id="bestSeller"></div>

    </div>

    <a href="index.html" class="block text-center mt-6 bg-blue-500 text-white py-4 rounded-2xl font-bold">
      Quay lại bán hàng
    </a>
    <div class="fixed bottom-0 left-0 right-0 border-t border-zinc-200 bg-white px-4 py-3">
      <div class="mx-auto flex max-w-md justify-around">

        <a href="test.html" class="flex flex-col items-center text-blue-500">
          <span class="text-4xl">💰</span>
          <span>Thu nhập</span>
        </a>

        <a href="chitieu.html" class="flex flex-col items-center text-zinc-500">
          <span class="text-4xl">💳</span>
          <span>Chi tiêu</span>
        </a>

        <a href="thongke.html" class="flex flex-col items-center text-zinc-500">
          <span class="text-4xl">📊</span>
          <span>Thống kê</span>
        </a>

      </div>
    </div>
  </div>

  <script>

    const soldCount =
      Number(localStorage.getItem("soldCount")) || 0;

    const totalMoney =
      Number(localStorage.getItem("totalMoney")) || 0;

    const itemStats =
      JSON.parse(localStorage.getItem("itemStats")) || {};

    function money(number) {

      return number.toLocaleString("vi-VN") + "đ";

    }

    document.getElementById("soldCount").textContent =
      soldCount;

    document.getElementById("totalMoney").textContent =
      money(totalMoney);

    const statsContainer =
      document.getElementById("itemStats");

    let maxCount = 0;
    let bestSeller = [];

    Object.entries(itemStats).forEach(([name, count]) => {

      const row =
        document.createElement("div");

      row.className =
        "flex justify-between border-b pb-2";

      row.innerHTML = `
        <span>${name}</span>
        <span class="font-bold text-red-500">
          ${count} cái
        </span>
      `;

      statsContainer.appendChild(row);

      if (count > maxCount) {

        maxCount = count;
        bestSeller = [name];

      } else if (count === maxCount) {

        bestSeller.push(name);

      }

    });

    const bestSellerBox =
      document.getElementById("bestSeller");

    if (bestSeller.length === 0) {

      bestSellerBox.innerHTML = `
        <p class="text-zinc-500">
          Chưa có dữ liệu
        </p>
      `;

    } else {

      bestSellerBox.innerHTML = `
        <div class="text-3xl font-bold text-green-600">
          🏆 ${bestSeller.join(", ")}
        </div>

        <p class="mt-2 text-zinc-500">
          ${maxCount} cái
        </p>
      `;

    }

  </script>

</body>

</html>
